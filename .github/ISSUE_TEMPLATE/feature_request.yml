name: Feature request
description: Suggest a scoped improvement or new capability.
title: "[Feature]: "
labels:
  - "type: feature"
  - "status: needs review"
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What staging workflow or user need should this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: true
  - type: textarea
    id: telemetry
    attributes:
      label: Telemetry impact
      description: What data would this capture, display, store, or share?
  - type: textarea
    id: privacy
    attributes:
      label: Privacy and security considerations
      description: What sensitive data or access-control concerns might be involved?
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - "priority: low"
        - "priority: medium"
        - "priority: high"
        - "priority: critical"
      default: 1
