name: Bug report
description: Report reproducible behavior that is not working as intended.
title: "[Bug]: "
labels:
  - "type: bug"
  - "status: needs reproduction"
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is broken?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Provide the smallest reliable reproduction.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Include Laravel, PHP, database, queue, browser, and OS details when relevant.
  - type: textarea
    id: privacy
    attributes:
      label: Privacy check
      description: Confirm that logs, screenshots, and examples do not include secrets or personal data.
  - type: checkboxes
    id: checks
    attributes:
      label: Before submitting
      options:
        - label: I searched existing issues.
          required: true
        - label: I removed secrets, tokens, cookies, and private data from this report.
          required: true
